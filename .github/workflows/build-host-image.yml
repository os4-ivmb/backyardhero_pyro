name: Build host image

# Builds and pushes the host Docker image (Next.js UI + Python daemon + ws +
# bridge) to Docker Hub whenever a host release tag is pushed:
#
#   host-<version>   -> push os4ivmb/backyardhero:latest and :v<version>
#
# This is the CI equivalent of host/run/osx/build_and_push_docker.sh -- the
# same multi-arch (amd64 + arm64) image, just built on a runner instead of a
# maintainer's laptop. ownerutils/deploy_host creates + pushes the host-<version>
# tag (alongside desktop-v<version>), so a single `deploy_host <version>` now
# fans out to this workflow for the image and build-desktop.yml for installers.
#
# workflow_dispatch (re)builds whatever host_version systemcfg.json currently
# declares, without a tag.
#
# Required repo secrets:
#   DOCKERHUB_USERNAME   Docker Hub account that owns the image repo
#   DOCKERHUB_TOKEN      a Docker Hub access token with write scope

on:
  push:
    tags:
      - "host-*"
  workflow_dispatch:

# Don't let two host releases race on the :latest tag.
concurrency:
  group: build-host-image
  cancel-in-progress: false

jobs:
  build:
    name: Build + push host image
    runs-on: ubuntu-latest
    # Forks won't have the Docker Hub secrets; skip rather than fail.
    if: github.repository == 'os4-ivmb/backyardhero_pyro'
    env:
      IMAGE: ${{ vars.HOST_IMAGE || 'os4ivmb/backyardhero' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve + validate version
        id: meta
        run: |
          set -euo pipefail
          version="$(python3 -c "import json;print(json.load(open('host/config/systemcfg.json'))['host_version'])")"
          [[ -n "${version}" ]] || { echo "::error::could not read host_version from host/config/systemcfg.json"; exit 1; }
          ref="${GITHUB_REF_NAME:-}"
          # When triggered by a tag, the tag's version must match systemcfg so we
          # never publish :v<N> whose contents aren't really host_version N.
          if [[ "${ref}" == host-* ]]; then
            tagver="${ref#host-}"
            if [[ "${tagver}" != "${version}" ]]; then
              echo "::error::tag ${ref} says v${tagver} but systemcfg.json host_version is ${version}"; exit 1
            fi
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Building host image v${version}"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: host
          file: host/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:v${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
