name: Build desktop installers

# Builds the "ready to go" Backyard Hero desktop installers for macOS
# (Apple Silicon + Intel) and Windows. Native pieces (embedded CPython,
# better-sqlite3) can't cross-compile, so each target builds on a matching
# runner. Artifacts are uploaded per job; wire signing/notarization secrets
# (see env below) to get installable, gatekeeper-clean builds.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (arm64)
            ebflags: --mac --arm64
          # No macOS x64 (Intel) leg. The only GitHub Intel image left
          # (macos-15-intel, retiring ~Aug 2027) has no prebuilt
          # llvmlite/numba wheel for the embedded x86_64 Python, so the
          # librosa audio stack falls back to a from-source llvmlite build
          # that needs an LLVM toolchain the runner doesn't provide -- it
          # fails at the cmake step. Apple Silicon covers modern Macs;
          # revisit only if Intel support is actually needed (would require
          # provisioning LLVM, or dropping the audio stack for that arch).
          # Pinned to windows-2022 (VS 2022 / v17). windows-latest moved to
          # Windows 2025, which ships VS "v18"; the node-gyp 10.1.0 bundled
          # with Node 20 can't parse it (ERR_CHILD_PROCESS_STDIO_MAXBUFFER
          # while probing, then "could not find Visual Studio 2017 or newer"),
          # breaking the better-sqlite3 native build. VS2022 is handled fine.
          - os: windows-2022
            label: Windows (x64)
            ebflags: --win --x64

    defaults:
      run:
        working-directory: host/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # node-gyp (better-sqlite3 rebuild) needs Python + a C toolchain. macOS
      # runners ship Xcode; Windows runners ship MSVC. setup-python gives
      # node-gyp a predictable interpreter.
      - name: Set up Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install desktop deps
        run: npm ci

      - name: Assemble resources (Next standalone + embedded Python)
        run: npm run build:resources
        env:
          BYH_INCLUDE_AUDIO: "1"
          # In-app support ticket signing. Baked into resources/runtime-config.json
          # (never committed) so the packaged app can sign + forward diagnostic bug
          # reports to the cloud gateway's /api/app-reports. Must match
          # APP_REPORT_SIGNING_SECRET on the gateway. When the secret is unset the
          # build still succeeds; in-app reporting is just disabled in that build.
          BYH_BUGREPORT_SECRET: ${{ secrets.BYH_BUGREPORT_SECRET }}
          # Optional override of the cloud gateway base URL (defaults to
          # https://cloud.backyard-hero.com in the app).
          BYH_BUGREPORT_URL: ${{ vars.BYH_BUGREPORT_URL }}

      # Only export signing/notarization vars when the secret is actually
      # present. A bare `env: CSC_LINK: ${{ secrets.X }}` injects an EMPTY
      # string when the secret is unset, and electron-builder treats ""
      # as a cert path -- resolving it to the project dir and dying with
      # "<dir> not a file" (both macPackager and winPackager).
      #
      # When no macOS cert is present we do NOT leave the app fully unsigned:
      # an unsigned arm64 app trips Gatekeeper's "is damaged" error, which the
      # user can't clear from the GUI (only by removing the quarantine xattr in
      # a terminal). Instead we ad-hoc sign it (mac.identity "-"), which yields
      # the normal, bypassable "unidentified developer" prompt. Ad-hoc keeps the
      # hardened runtime on, so the embedded-Python entitlements in
      # build/entitlements.mac.plist (allow-jit, disable-library-validation, …)
      # are what keep it from crashing on launch. The build step reads
      # BYH_MAC_IDENTITY below. shell: bash runs on Windows too (git-bash).
      - name: Configure code signing
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            echo "CSC_LINK=$MAC_CSC_LINK" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "BYH_MAC_IDENTITY=-" >> "$GITHUB_ENV"
          fi
          if [ -n "$WIN_CSC_LINK" ]; then
            echo "WIN_CSC_LINK=$WIN_CSC_LINK" >> "$GITHUB_ENV"
            echo "WIN_CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi
          if [ -n "$APPLE_ID" ]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          fi

      # `-c.mac.identity=-` ad-hoc signs when no real cert is configured (set
      # via BYH_MAC_IDENTITY above). Empty on the signed path and on Windows, so
      # electron-builder uses the cert / its own defaults there.
      - name: Build installer
        shell: bash
        run: |
          extra=""
          if [ -n "${BYH_MAC_IDENTITY:-}" ]; then
            extra="-c.mac.identity=${BYH_MAC_IDENTITY}"
          fi
          npx electron-builder ${{ matrix.ebflags }} $extra --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: backyardhero-${{ matrix.os }}
          path: |
            host/desktop/dist/*.dmg
            host/desktop/dist/*.exe
            host/desktop/dist/*.zip
            host/desktop/dist/*.blockmap
            host/desktop/dist/latest*.yml
          if-no-files-found: warn

  # Publish the built installers to the static download site, scoped exactly
  # like the firmware release: the deploy key is locked (authorized_keys forced
  # rrsync command) to the download/ folder, so this can only write into
  # download/desktop/. It also writes download/desktop/manifest.json (version +
  # per-platform links) for the website / in-app update check. Runs once, after
  # all matrix legs, so the manifest is written from the full installer set.
  # See ownerutils/FIRMWARE_RELEASE.md for the shared secrets + host setup.
  publish:
    name: Publish to download site
    needs: build
    runs-on: ubuntu-latest
    if: github.repository == 'os4-ivmb/backyardhero_pyro'
    steps:
      - uses: actions/checkout@v4

      - name: Download built installers
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: backyardhero-*
          merge-multiple: true

      - name: Resolve + validate version
        id: meta
        run: |
          set -euo pipefail
          version="$(python3 -c "import json;print(json.load(open('host/desktop/package.json'))['version'])")"
          [[ -n "${version}" ]] || { echo "::error::could not read version from package.json"; exit 1; }
          ref="${GITHUB_REF_NAME:-}"
          if [[ "${ref}" == desktop-v* ]]; then
            tagver="${ref#desktop-v}"
            if [[ "${tagver}" != "${version}" ]]; then
              echo "::error::tag ${ref} says v${tagver} but package.json is ${version}"; exit 1
            fi
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Publishing desktop v${version}"

      - name: Configure scoped deploy SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DOWNLOAD_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DOWNLOAD_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_KEY}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          printf '%s\n' "${KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"

      - name: Publish installers + manifest
        env:
          SRC_DIR: dist-artifacts
          VERSION: ${{ steps.meta.outputs.version }}
          DESKTOP_BASE_URL: ${{ vars.DESKTOP_DOWNLOAD_BASE_URL || 'https://backyard-hero.com/download/desktop' }}
          REMOTE_HOST: ${{ secrets.DOWNLOAD_DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DOWNLOAD_DEPLOY_USER }}
          REMOTE_PORT: ${{ vars.DOWNLOAD_DEPLOY_PORT || '22' }}
        run: ./.github/scripts/publish_desktop.sh
