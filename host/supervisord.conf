[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/var/run/supervisord.pid

# M8: every program runs as the unprivileged `node` user (uid 1000). The
# in-container daemon needs no hardware access -- serial reaches the dongle
# via the host-side TCP bridge and GPIO is mocked (state comes from the
# dongle), so dropping root costs nothing operationally.
[program:websock]
command=python3 -u /app/pythings/websock_server/ws_server.py
user=node
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=10

[program:firework-daemon]
command=python3 -u /app/pythings/pc_daemon/pc_daemon.py
user=node
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=20

[program:byh-app]
command=npm run start
user=node
environment=PORT=1776,NODE_ENV=production,HOSTNAME=0.0.0.0,HOME=/home/node
directory=/app/byh_app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
priority=30