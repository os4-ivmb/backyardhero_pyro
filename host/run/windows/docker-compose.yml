# Production compose for Windows development boxes (Docker Desktop).
#
# Mirrors the osx prod compose. Docker Desktop on Windows resolves
# host.docker.internal natively (no extra_hosts needed) and we don't
# bind port 80 (Windows hosts often have IIS or other services there).

services:
  firework-system:
    image: ${BYH_IMAGE:-os4ivmb/backyardhero:latest}
    container_name: firework-system
    restart: unless-stopped
    volumes:
      - ../../data:/data
      - ../../config:/config
      - /tmp/d_cmd:/tmp/d_cmd
      # NOTE: there is deliberately NO /tmp/ota_staging bind mount here.
      # On Windows the bridge runs host-native (it owns COM<N>) while
      # this container runs inside the WSL2 VM, so the two share no
      # filesystem -- a staged container path like /tmp/ota_staging/...
      # is unreachable for the native bridge. The daemon instead ships
      # the dongle firmware bytes to the bridge inline (content_b64), so
      # no shared staging dir is needed.
    ports:
      - "1776:1776"  # Next.js app
      - "8090:8090"  # WebSocket server
    environment:
      - SERIAL_PORT=${SERIAL_PORT:-COM3}
      - SERIAL_BAUD=115200
      - LED_STATE_FILE=/data/ledstate
      - NODE_ENV=production
    privileged: true
