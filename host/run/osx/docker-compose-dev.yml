# Development compose for macOS development boxes (Docker Desktop).
#
# Builds the image locally and bind-mounts source so edits hot-reload
# via Next.js HMR (frontend / API routes) and supervisorctl restart
# (Python). No port 80 binding, no extra_hosts -- both unnecessary on
# Docker Desktop and risk colliding with whatever else the dev has
# running on the mac.

services:
  firework-system:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: firework-system
    restart: unless-stopped
    volumes:
      - ../../data:/data
      - ../../config:/config
      # /tmp/d_cmd: daemon's command-file inbox. Both writer (Next.js
      # API) and reader (daemon) live in-container, but we also bind
      # it from the host so an operator can drop debug commands from
      # the mac shell -- matching the prod compose for symmetry.
      - /tmp/d_cmd:/tmp/d_cmd
      # NOTE: no /tmp/ota_staging bind mount needed. The daemon reads the
      # staged firmware back out of the container's own staging dir and
      # ships it to the host-side bridge inline (content_b64) rather than
      # via a shared path, so the bridge never reads the container's
      # staging dir directly.
      - ../../pythings:/app/pythings
      - ../../byh_app/backyardhero:/app/byh_app/
      # NAMED volumes shadow the host bind mount so the container keeps its
      # own Linux-built node_modules + .next -- otherwise the macOS-built
      # better_sqlite3.node leaks in and require() blows up with "invalid
      # ELF header". They're named (not anonymous) on purpose: anonymous
      # volumes are orphaned on every `compose down` and a fresh pair is
      # created on the next `up`, so each dev cycle stranded a ~1-2 GB
      # node_modules volume (plus .next) inside Docker.raw, which only ever
      # grows. Named volumes are reused across runs -- no accumulation, and
      # startup is faster since node_modules persists.
      - byh_node_modules:/app/byh_app/node_modules
      - byh_next:/app/byh_app/.next
      - ../../supervisord.dev.conf:/etc/supervisor/conf.d/supervisord.conf
    ports:
      - "1776:1776"  # Next.js app
      - "8090:8090"  # WebSocket server
    environment:
      - SERIAL_PORT=${SERIAL_PORT:-/dev/tty.usbmodem01}
      - SERIAL_BAUD=115200
      - LED_STATE_FILE=/data/ledstate
      - NODE_ENV=development
    privileged: true

# Reused across dev runs so node_modules / .next aren't re-created (and
# orphaned) on every up/down cycle. Reset them with:
#   docker compose -f run/osx/docker-compose-dev.yml down --volumes
volumes:
  byh_node_modules:
  byh_next:
