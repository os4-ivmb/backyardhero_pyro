# Production compose for macOS development boxes (Docker Desktop).
#
# Differences vs Pi:
#   * Does NOT bind host port 80 (mac dev boxes may have apache/nginx/
#     anything else on 80; localhost:1776 is the normal access pattern).
#   * Does NOT include extra_hosts -- Docker Desktop resolves
#     host.docker.internal natively, so the explicit entry is redundant.
#   * No pull_policy override (mac dev boxes always have internet; let
#     `docker compose pull` decide).
#
# Relative paths are resolved against this file's directory (host/run/osx/),
# so ../../ points back at the host/ root.

services:
  firework-system:
    image: ${BYH_IMAGE:-os4ivmb/backyardhero:latest}
    container_name: firework-system
    restart: unless-stopped
    volumes:
      - ../../data:/data
      - ../../config:/config
      - /tmp/d_cmd:/tmp/d_cmd
      # NOTE: no /tmp/ota_staging bind mount needed. The daemon reads the
      # staged firmware back out of the container's own staging dir and
      # ships it to the host-side bridge inline (content_b64) rather than
      # via a shared path, so the bridge never reads the container's
      # staging dir directly.
    ports:
      - "1776:1776"  # Next.js app
      - "8090:8090"  # WebSocket server
    environment:
      - SERIAL_PORT=${SERIAL_PORT:-/dev/tty.usbmodem01}
      - SERIAL_BAUD=115200
      - LED_STATE_FILE=/data/ledstate
      - NODE_ENV=production
    privileged: true
