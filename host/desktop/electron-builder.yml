appId: com.backyardhero.host
productName: Backyard Hero
copyright: Backyard Hero

directories:
  output: dist
  buildResources: build

# Auto-update feed. electron-updater reads latest.yml / latest-mac.yml from
# this URL; configuring it here makes electron-builder (a) emit those feed
# files + .blockmap during the build and (b) embed app-update.yml into the
# packaged app so the runtime knows where to look. We DON'T let
# electron-builder upload (CI runs `--publish never`): the installers + feed
# files are rsynced to this same static path by .github/scripts/publish_desktop.sh.
publish:
  - provider: generic
    url: https://backyard-hero.com/download/desktop/
    channel: latest

# Only the small Electron glue is packed into the asar; the heavy payload
# (Next bundle + embedded Python + sources) ships as extraResources, assembled
# by scripts/build-resources.mjs into ./resources before electron-builder runs.
files:
  - src/**
  - package.json

asar: true

extraResources:
  - from: resources
    to: .
    filter:
      - "**/*"

# ---------------------------------------------------------------------------
# macOS: .dmg, hardened runtime + entitlements so the app can be notarized.
# Signing identity is taken from the keychain / CSC_LINK env; notarization is
# enabled in CI when APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
# (or an App Store Connect API key) are present in the environment.
# ---------------------------------------------------------------------------
mac:
  category: public.app-category.utilities
  target:
    # dmg is the human download; zip is what electron-updater consumes for
    # macOS auto-update (Squirrel.Mac can't update from a .dmg). Auto-update
    # on macOS additionally requires a signed + notarized app, so on unsigned
    # CI builds the feed is still valid but the runtime update is a no-op
    # until signing secrets are wired in.
    #
    # arm64 only: the CI macOS leg runs `electron-builder --mac --arm64` (see
    # .github/workflows/build-desktop.yml for why there's no Intel leg). These
    # per-target arch lists OVERRIDE the --arm64 CLI flag, so leaving x64 here
    # makes electron-builder cross-build an unwanted Intel DMG -- and that x64
    # dmgbuild/hdiutil step is what was failing ("no mountable file systems").
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # The embedded Python ships many unsigned .so/.dylib files; let them load
  # under the hardened runtime via the entitlements rather than failing.
  extendInfo:
    NSSupportsAutomaticGraphicsSwitching: true

dmg:
  title: Backyard Hero

# ---------------------------------------------------------------------------
# Windows: NSIS installer (per-user, no admin required). Code signing is via
# CSC_LINK / CSC_KEY_PASSWORD env when a cert is available.
# ---------------------------------------------------------------------------
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Backyard Hero

linux:
  target:
    - AppImage
  category: Utility
